    <ellipse cx="160" cy="160" rx="52" ry="150"/>
    <ellipse cx="160" cy="160" rx="106" ry="150"/>
    <line x1="14" y1="160" x2="306" y2="160"/>
    <line x1="34" y1="106" x2="286" y2="106"/>
    <line x1="34" y1="214" x2="286" y2="214"/>
